apiVersion: v1
kind: ConfigMap

metadata:
  name: postgres-init
  namespace: myapp

data:
  init.sql: |
    CREATE TABLE users (
        id SERIAL PRIMARY KEY,
        username VARCHAR(16) UNIQUE NOT NULL,
        pass VARCHAR(16) NOT NULL
    );

    INSERT INTO users(username,pass) VALUES
    ('user1', 'abc'),
    ('user2', 'def'),
    ('user3', 'ghi');
