name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/murderose/chmurowe/backend:latest ./backend
  FRONTEND_IMAGE: ghcr.io/murderose/chmurowe/frontend:latest ./frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: |
          docker build -t ghcr.io/murderose/chmurowe/backend:latest ./backend
          docker build -t ghcr.io/murderose/chmurowe/frontend:latest ./frontend

      - name: Push images
        run: |
          docker push ghcr.io/murderose/chmurowe/backend:latest
          docker push ghcr.io/murderose/chmurowe/frontend:latest

      - name: Basic validation
        run: |
          test -f k8s/namespace.yaml
          test -f k8s/ingress.yaml
          test -f k8s/configmap.yaml

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Validate manifests
        run: |
          kubectl apply --dry-run=client -f k8s/namespace.yaml
          kubectl apply --dry-run=client -f k8s/secret.yaml
          kubectl apply --dry-run=client -f k8s/configmap.yaml
          kubectl apply --dry-run=client -f k8s/postgres/
          kubectl apply --dry-run=client -f k8s/backend/
          kubectl apply --dry-run=client -f k8s/frontend/
          kubectl apply --dry-run=client -f k8s/ingress.yaml
          kubectl apply --dry-run=client -f k8s/pdb.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/postgres/
          kubectl apply -f k8s/backend/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/pdb.yaml

      - name: Check rollout
        run: |
          kubectl rollout status deployment/postgres -n animal-help-app --timeout=180s
          kubectl rollout status deployment/backend -n animal-help-app --timeout=180s
          kubectl rollout status deployment/frontend -n animal-help-app --timeout=180s

      - name: Verify backend health
        run: |
          kubectl port-forward -n animal-help-app service/backend-service 3001:3001 &
          sleep 5
          curl -f http://localhost:3001/healthz